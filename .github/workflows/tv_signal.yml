name: "🎯 TradingView Signal Handler"

on:
  repository_dispatch:
    types: [tv_buy, tv_sell]

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt
      
      - name: 💾 Restaurar base de datos desde artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_URL=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name=="pump-detector-db" and .expired==false) | .archive_download_url' \
            2>/dev/null | head -1)
          
          if [ -n "$ARTIFACT_URL" ]; then
            echo "📦 Restaurando DB..."
            mkdir -p data
            gh api "$ARTIFACT_URL" > db.zip 2>/dev/null || true
            if [ -f db.zip ] && [ -s db.zip ]; then
              unzip -o db.zip -d data/ 2>/dev/null || true
              echo "✅ DB restaurada"
            fi
            rm -f db.zip
          fi

      - name: 🚀 Procesar Señal de TradingView
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET: ${{ secrets.MEXC_API_SECRET }}
        run: |
          ACTION=$(echo '${{ github.event.action }}' | sed 's/tv_//' | tr '[:lower:]' '[:upper:]')
          SYMBOL='${{ github.event.client_payload.symbol }}'
          
          python main.py tv_signal "$ACTION" "$SYMBOL"

      - name: 💾 Guardar base de datos (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pump-detector-db
          path: data/pump_detector.db
          retention-days: 90
          overwrite: true
