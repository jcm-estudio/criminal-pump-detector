name: "🔄 Update — Scan cada 15 min"

on:
  schedule:
    # Ejecutar cada 15 minutos, minuto 3 (evitar el top de la hora)
    - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependencias
        run: pip install requests

      - name: 💾 Restaurar base de datos desde artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Intentar descargar el artifact más reciente
          ARTIFACT_URL=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name=="pump-detector-db" and .expired==false) | .archive_download_url' \
            2>/dev/null | head -1)
          
          if [ -n "$ARTIFACT_URL" ]; then
            echo "📦 Restaurando DB desde artifact..."
            mkdir -p data
            gh api "$ARTIFACT_URL" > db.zip 2>/dev/null || true
            if [ -f db.zip ] && [ -s db.zip ]; then
              unzip -o db.zip -d data/ 2>/dev/null || true
              if [ -f data/pump_detector.db ]; then
                echo "✅ DB restaurada exitosamente"
                ls -la data/pump_detector.db
              else
                echo "⚠️ DB no encontrada en artifact, se creará nueva"
              fi
            else
              echo "⚠️ Artifact vacío, se creará DB nueva"
            fi
            rm -f db.zip
          else
            echo "ℹ️ No hay artifact previo, primera ejecución"
          fi
      
      - name: 🔄 Ejecutar Update + Scoring + Alertas
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          MORALIS_API_KEY: ${{ secrets.MORALIS_API_KEY }}
        run: python main.py update
      
      - name: 💾 Guardar base de datos como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pump-detector-db
          path: data/pump_detector.db
          retention-days: 7
          overwrite: true
